<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fluminense FC</title>
    <!-- Adicionando Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Adicionando Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para a página de login */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: url('BackgroundLogin.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 97, 60, 0.7); /* Overlay verde com transparência */
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #870A28 0%, #00613C 100%);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }

        .login-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #870A28;
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-subtitle {
            color: #666;
            font-size: 16px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #f8f8f8;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #870A28;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(135, 10, 40, 0.1);
        }

        .form-input::placeholder {
            color: #999;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #870A28;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #870A28;
        }

        .forgot-password {
            color: #00613C;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #870A28;
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #870A28 0%, #a50d32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(135, 10, 40, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            color: #666;
        }

        .login-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #e0e0e0;
        }

        .login-divider span {
            background-color: white;
            padding: 0 20px;
            position: relative;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #00613C;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #870A28;
            text-decoration: underline;
        }

        .back-to-home {
            position: fixed; /* <-- Mude de absolute para fixed */
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000; /* Garante que fique acima de tudo */
        }



        .back-to-home:hover {
            background: white;
            transform: scale(1.1);
        }

        .back-to-home i {
            color: #870A28;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .login-card {
                margin: 20px;
                padding: 30px 25px;
            }
            
            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body class="login-page">
    <button class="back-to-home" onclick="window.location.href='index.html'" aria-label="Voltar para a página inicial">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="flu.png" alt="Escudo Fluminense FC" class="login-logo">
                <h1 class="login-title">Fazer Login</h1>
                <p class="login-subtitle">Acesse sua conta do Fluminense FC</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Digite seu e-mail" required>
                </div>

                <div class="form-group" style="position: relative;">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Digite sua senha" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'passwordIcon')">
                        <i class="fas fa-eye" id="passwordIcon"></i>
                    </button>
                </div>



                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt" style="margin-right: 10px;"></i>
                    Entrar
                </button>
            </form>

            <div class="login-divider">
                <span>ou</span>
            </div>

            <div class="register-link">
                <p>Ainda não tem uma conta? <a href="cadastro.html">Criar conta</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const passwordIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="auth.js"></script>
    <script>
        // Verificar se já está logado
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const sessao = await verificarSessao();
                if (sessao.logado) {
                    window.location.href = 'index.html';
                    return;
                }
            } catch (error) {
                console.log('Erro ao verificar sessão:', error);
            }
        });

        // Função para processar o login
        async function processarLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('password').value;
            const loginButton = document.querySelector('.login-button');
            const originalText = loginButton.innerHTML;
            
            // Mostrar loading
            loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            loginButton.disabled = true;
            
            try {
                const response = await fazerLogin(email, senha);
                
                // Login bem-sucedido
                alert('Login realizado com sucesso!');
                
                // Redirecionar baseado no tipo de usuário
                if (response.usuario.tipo_usuario === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                alert('Erro no login: ' + error.message);
                
                // Restaurar botão
                loginButton.innerHTML = originalText;
                loginButton.disabled = false;
            }
        }

        // Adicionar event listener ao formulário
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', processarLogin);
            }
            
            // Adiciona efeito de foco nos inputs
            document.querySelectorAll('.form-input').forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
